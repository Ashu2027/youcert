<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>YOUCERT - Forgot Password</title>
    
    <link rel="icon" type="image/png" href="/static/icon/logo.png" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- Lucide Icons (Premium Icons) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* =========================================
           THEME & DESIGN SYSTEM (Auth Screen)
           ========================================= */
        :root {
            /* Backgrounds */
            --bg-light-primary: #F5F5F7;
            --bg-light-secondary: #FFFFFF;
            
            /* Text Colors */
            --text-dark: #1D1D1F;
            --text-muted: #6E6E73;
            --text-on-brand: #FFFFFF;
            
            /* Brand Gradients (Used for text highlights/accents) */
            --brand-gradient: linear-gradient(135deg, #6366F1 0%, #9333ea 100%);
            --cta-gradient: linear-gradient(135deg, #4F46E5 0%, #A855F7 100%);
            
            /* Glassmorphism */
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
            --card-border: rgba(0, 0, 0, 0.06);

            /* Radius */
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        /* Base Styles: Full screen background */
        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            background-color: var(--bg-light-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        /* --- Auth Card --- */
        .auth-card {
             background: var(--glass-bg);
             border-radius: var(--radius-lg);
             border: 1px solid var(--card-border);
             box-shadow: var(--glass-shadow);
             width: 100%;
             max-width: 420px;
             padding: 2.5rem;
             position: relative;
             overflow: hidden;
        }

        /* Decorative top line (Brand Gradient) */
        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: var(--brand-gradient);
        }
        
        /* Logo & Header */
        .logo-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #F1F5F9;
        }

        .logo-wrapper {
            width: 48px;
            height: 48px;
            background: #EEF2FF;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.75rem;
            color: #4F46E5;
        }
        
        .brand-name {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--brand-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Form Elements */
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            font-size: 0.875rem;
            font-weight: 600;
        }
        
        .form-input-styled {
            width: 100%;
            padding: 0.8rem 1rem;
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: var(--radius-md);
            color: var(--text-dark);
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .form-input-styled:focus {
            outline: none;
            border-color: #6366F1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        /* Buttons */
        .btn-primary-custom {
            background: #000000; /* Black CTA button */
            color: white;
            border: none;
            border-radius: var(--radius-md);
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-primary-custom:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            background: #1a1a1a;
        }
        
        .form-footer a {
            color: #4F46E5;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .form-footer a:hover {
            text-decoration: underline;
            color: #6366F1;
        }
    </style>
    
    <!-- Mobile Responsive Framework -->
    <link rel="stylesheet" href="/static/css/mobile-premium.css">
</head>
<body>

    <div class="auth-card">
        <!-- Logo and App Name -->
        <div class="logo-box">
            <div class="logo-wrapper">
                <img src="/static/icon/logo.png" alt="Youcert Logo" class="w-8 h-8" onerror="this.style.display='none'" />
            </div>
            <span class="brand-name">Youcert</span>
        </div>
        
        <!-- Heading -->
        <h2 class="text-center text-2xl font-bold mb-2 text-dark">Reset Your Password</h2>
        <p class="text-center text-sm text-muted mb-8">Enter your email to receive a reset link.</p>
        
        <!-- Flash Messages (Placeholder for server-side messages) -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="mb-4">
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'error' if category == 'error' else 'success' }} flex items-center gap-2">
                             <i data-lucide="{{ 'alert-circle' if category == 'error' else 'check-circle' }}" style="width: 18px; height: 18px;"></i>
                            <span>{{ message }}</span>
                        </div>
                    {% endfor %}
                </div>
                <style>
                    /* Custom styles for in-card alerts */
                    .alert-success { background: #D1FAE5; color: #059669; border: 1px solid #A7F3D0; padding: 0.75rem; border-radius: 8px; }
                    .alert-error { background: #FEE2E2; color: #B91C1C; border: 1px solid #FECACA; padding: 0.75rem; border-radius: 8px; }
                </style>
            {% endif %}
        {% endwith %}

        <!-- Form -->
        <form method="POST" action="/creator/forgot_password">
            <!-- CSRF Token -->
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <div class="mb-6">
                <label for="resetEmail" class="form-label">Registered Email</label>
                <input 
                    type="email" 
                    id="resetEmail" 
                    name="email" 
                    required 
                    class="form-input-styled" 
                    placeholder="name@example.com"
                    autofocus
                />
            </div>
            
            <button type="submit" class="w-full btn-primary-custom py-3">
                Send Reset Link
                <i data-lucide="mail-open" style="width: 18px; height: 18px;"></i>
            </button>
        </form>
        
        <!-- Footer Link -->
        <p class="text-sm text-center text-muted mt-6 form-footer">
            Remember your password?
            <a href="/creator/login">Go back to Login</a>
        </p>
    </div>
    
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
    
    <!-- Mobile Responsive Framework -->
    <script src="/static/js/mobile-premium.js"></script>
</body>
</html>
