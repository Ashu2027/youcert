<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Request | YOUCERT Admin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* =========================================
           THEME + DESIGN SYSTEM (Matching Dashboard)
           ========================================= */
        :root {
            /* Backgrounds */
            --bg-light-primary: #F5F5F7;
            --bg-card: #FFFFFF;
            
            /* Text Colors */
            --text-dark: #1D1D1F;
            --text-muted: #6E6E73;
            
            /* Brand Gradients */
            --brand-gradient: linear-gradient(135deg, #6366F1 0%, #9333ea 100%);
            --success-bg: #D1FAE5;
            --success-text: #059669;
            
            /* Dimensions */
            --radius-lg: 16px;
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
            --card-border: rgba(0, 0, 0, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light-primary);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* --- CARD CONTAINER --- */
        .confirm-card {
            background: var(--bg-card);
            width: 100%;
            max-width: 480px;
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            box-shadow: var(--glass-shadow);
            border: 1px solid var(--card-border);
            text-align: center;
        }

        /* --- HEADER AREA --- */
        .status-icon-box {
            width: 64px; height: 64px;
            border-radius: 50%;
            background: var(--success-bg);
            color: var(--success-text);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem auto;
        }
        
        .status-icon-box svg { width: 32px; height: 32px; }

        .title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text-dark); }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2rem; line-height: 1.5; }

        /* --- DETAILS LIST --- */
        .details-list {
            background: #F8FAFC;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: left;
            margin-bottom: 2rem;
            border: 1px solid var(--card-border);
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid #E2E8F0;
            font-size: 0.9rem;
        }

        .detail-item:last-child { border-bottom: none; }
        
        .label { color: var(--text-muted); font-weight: 500; }
        .value { font-weight: 600; color: var(--text-dark); }
        
        .role-badge {
            background: var(--brand-gradient);
            color: white;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .reason-box {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            background: white;
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            line-height: 1.4;
        }

        /* --- BUTTONS --- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0.875rem;
            border-radius: 10px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            border: none;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--brand-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.35);
        }

        .btn-outline {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid transparent;
            margin-top: 0.75rem;
        }

        .btn-outline:hover {
            color: var(--text-dark);
            background: #F1F5F9;
        }
    </style>
    
    <!-- Mobile Responsive Framework -->
    <link rel="stylesheet" href="/static/css/mobile-premium.css">
</head>
<body>

    <div class="confirm-card">
        <div class="status-icon-box">
            <i data-lucide="check"></i>
        </div>

        <h1 class="title">Email Verified</h1>
        <p class="subtitle">Please review your details carefully before submitting your admin access request.</p>

        <div class="details-list">
            <div class="detail-item">
                <span class="label">Full Name</span>
                <span class="value">{{ name }}</span>
            </div>
            <div class="detail-item">
                <span class="label">Email Address</span>
                <span class="value">{{ email }}</span>
            </div>
            <div class="detail-item">
                <span class="label">Contact Number</span>
                <span class="value">{{ contact_number }}</span>
            </div>
            <div class="detail-item">
                <span class="label">Requested Role</span>
                <span class="role-badge">{{ designation_names[requested_designation] }}</span>
            </div>
            <div class="detail-item" style="display: block; border: none; padding-top: 1rem;">
                <span class="label" style="display: block; margin-bottom: 0.5rem;">Reason for Access</span>
                <div class="reason-box">{{ reason }}</div>
            </div>
        </div>

        <form method="POST" action="{{ url_for('sevak69.register_request') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <input type="hidden" name="action" value="submit_request">
            <input type="hidden" name="email" value="{{ email }}">

            <button type="submit" class="btn btn-primary">
                <span>Submit Final Request</span>
                <i data-lucide="arrow-right" style="width: 18px;"></i>
            </button>
            
            <a href="{{ url_for('sevak69.login') }}" class="btn btn-outline">
                Cancel & Return to Login
            </a>
        </form>
    </div>

    <script>
        lucide.createIcons();
    </script>

    
    <!-- Mobile Responsive Framework -->
    <script src="/static/js/mobile-premium.js"></script>
</body>
</html>
